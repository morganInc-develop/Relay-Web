name: Deploy Platform

# DEPLOYMENT NOTE:
# The RelayWeb platform app (apps/platform) is deployed via Vercel's native
# GitHub integration — Vercel auto-deploys on every push to main automatically.
# This workflow handles CI validation only (TypeScript check).
# If Vercel auto-deploy is ever disabled, add a deploy hook step here using:
#   secrets.VERCEL_PLATFORM_DEPLOY_HOOK_URL
# and create that hook at: Vercel Dashboard → Project → Settings → Git → Deploy Hooks

on:
  push:
    branches:
      - main
    paths:
      - 'apps/platform/**'
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript Check — Platform
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/platform/package-lock.json

      - name: Install dependencies
        working-directory: apps/platform
        run: npm ci

      - name: Run TypeScript check
        working-directory: apps/platform
        run: npx tsc --noEmit

      - name: Confirm deployment method
        if: success()
        run: |
          echo "TypeScript check passed at $(date -u)"
          echo "Platform deployment: handled by Vercel GitHub integration (auto-deploy on push to main)"
